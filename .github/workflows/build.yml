# Secretless CI: validates the storyboard against committed scene artifacts and
# assembles explainer.html. NO model API keys exist here by design — scene
# regeneration is always a maintainer-local act (see CONTRIBUTING.md).
name: build
on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: dpetkevich/explainer
          ref: main
          path: .tool
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install tool
        run: cd .tool && npm ci --ignore-scripts
      - name: Validate (schema + scene/spec sync)
        run: cd .tool && npx tsx src/repo-cli.ts validate "$GITHUB_WORKSPACE"
      - name: Assemble
        run: cd .tool && npx tsx src/repo-cli.ts assemble "$GITHUB_WORKSPACE"
      - name: Upload PR preview
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: explainer-preview
          path: explainer.html
      - name: Prepare Pages payload
        if: github.event_name == 'push'
        run: mkdir -p _site && cp explainer.html _site/index.html
      - name: Upload Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
