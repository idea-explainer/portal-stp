<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Maneuver Demand</title>
<style>
:root{
  --bg:#0f1420;
  --panel:#161d2b;
  --fg:#e8ecf4;
  --muted:#93a0b8;
  --accent:#5ec2ff;
  --earth:#2f6f4f;
  --band:#243b57;
  --dot:#ffd166;
  --bar1:#5ec2ff;
  --bar2:#ff8a65;
  --bar3:#a78bfa;
  --bar4:#4dd0a7;
  --baseline:#93a0b8;
  --track:#2a3446;
}
@media (prefers-color-scheme: light){
  :root{
    --bg:#f5f7fb;
    --panel:#ffffff;
    --fg:#141a24;
    --muted:#57657c;
    --accent:#0b7bbf;
    --earth:#3f8f66;
    --band:#d7e6f5;
    --dot:#c9820a;
    --bar1:#0b7bbf;
    --bar2:#c4551f;
    --bar3:#6b46c1;
    --bar4:#1a8f66;
    --baseline:#8a97ab;
    --track:#dbe2ee;
  }
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--fg);
  font:13px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
  padding:12px;
}
.wrap{max-width:680px;margin:0 auto;display:flex;flex-wrap:wrap;gap:14px}
.panel{background:var(--panel);border-radius:10px;padding:12px;flex:1 1 300px;min-width:260px}
h1{font-size:13px;margin:0 0 8px;color:var(--muted);font-weight:600;letter-spacing:.02em}
canvas{max-width:100%;display:block;margin:0 auto;background:transparent}
.readouts{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.stat{flex:1 1 110px;background:var(--track);border-radius:8px;padding:8px 10px}
.stat .lbl{color:var(--muted);font-size:11px}
.stat .val{font-size:19px;font-weight:700;color:var(--accent)}
.controls{margin-top:10px}
.controls label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px}
input[type=range]{width:100%}
.eq{font-size:13px;background:var(--track);border-radius:8px;padding:6px 10px;margin-top:8px;color:var(--fg)}
button{background:var(--accent);color:#08131f;border:none;border-radius:6px;padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer;margin-left:8px}
.bar-row{margin-top:6px}
.bar-track{width:100%;height:16px;border-radius:4px;overflow:hidden;display:flex;background:var(--track)}
.bar-seg{height:100%}
.bar-label{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:2px}
.legend{display:flex;gap:8px;flex-wrap:wrap;font-size:10px;color:var(--muted);margin-top:6px}
.sw{width:8px;height:8px;display:inline-block;border-radius:2px;margin-right:3px;vertical-align:middle}
</style>
</head>
<body>
<div class="wrap">
  <div class="panel">
    <h1>Orbital shell, 500&ndash;2000 km altitude</h1>
    <canvas id="cv" width="320" height="320"></canvas>
    <div class="controls">
      <label for="nslider">Orbital satellite population, N <span id="playholder"></span></label>
      <input type="range" id="nslider" min="0" max="1000" step="1" value="0">
    </div>
  </div>
  <div class="panel">
    <h1>Conjunction workload</h1>
    <div class="readouts">
      <div class="stat"><div class="lbl">Satellites, N</div><div class="val" id="nval">15,000</div></div>
      <div class="stat"><div class="lbl">Conjunction rate vs today</div><div class="val" id="mval">1.0×</div></div>
    </div>
    <div class="eq">R = (N / 15,000)²</div>

    <h1 style="margin-top:14px">Filed constellations vs today</h1>
    <div class="bar-row">
      <div class="bar-track" id="bigbar"></div>
      <div class="bar-label"><span>0</span><span id="totlab">1.235M filed</span></div>
    </div>
    <div class="bar-row">
      <div class="bar-track" id="basebar"></div>
      <div class="bar-label"><span>0</span><span>~15,000 active today</span></div>
    </div>
    <div class="legend">
      <span><span class="sw" style="background:var(--bar1)"></span>broadband 95k</span>
      <span><span class="sw" style="background:var(--bar2)"></span>SpaceX ODC 1.0M</span>
      <span><span class="sw" style="background:var(--bar3)"></span>Starcloud 88k</span>
      <span><span class="sw" style="background:var(--bar4)"></span>Blue Origin 51.6k</span>
    </div>
  </div>
</div>

<script>
// ---- physical constants ----
const GM = 398600.4418;      // km^3/s^2, Earth standard gravitational parameter
const R_EARTH = 6371;        // km
const N_TODAY = 15000;       // active satellites today
const N_MAX = 1200000;       // filed total (approx), spec ceiling
const SPEC_MULT = 80;        // N_MAX = N_TODAY * 80

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const dpr = Math.min(window.devicePixelRatio||1, 2);
cv.width = 320*dpr; cv.height = 320*dpr;
ctx.scale(dpr,dpr);

function cssVar(name){ return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

const slider = document.getElementById('nslider');
const nval = document.getElementById('nval');
const mval = document.getElementById('mval');

const reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
let playing = !reduceMotion;
const playholder = document.getElementById('playholder');
let playBtn = null;
if (reduceMotion){
  playBtn = document.createElement('button');
  playBtn.textContent = 'Play';
  playBtn.addEventListener('click', ()=>{
    playing = !playing;
    playBtn.textContent = playing ? 'Pause' : 'Play';
    if (playing) lastTime = performance.now();
  });
  playholder.appendChild(playBtn);
}

let dots = [];
const R_PX_EARTH = 60;      // canvas px radius of Earth
const R_PX_MAX = 145;       // canvas px radius of outer band edge
const ALT_MIN = 500, ALT_MAX = 2000; // km

function altToPx(altKm){
  const t = (altKm - ALT_MIN)/(ALT_MAX - ALT_MIN);
  return R_PX_EARTH + t*(R_PX_MAX - R_PX_EARTH);
}

function generateDots(N){
  const count = Math.round(Math.min(2600, N/500));
  const arr = new Array(count);
  for (let i=0;i<count;i++){
    const alt = ALT_MIN + Math.random()*(ALT_MAX-ALT_MIN);
    const rKm = R_EARTH + alt;
    const T = 2*Math.PI*Math.sqrt((rKm*rKm*rKm)/GM); // seconds, Kepler circular period
    const omega = 2*Math.PI/T; // rad/s, real angular velocity
    arr[i] = {
      angle0: Math.random()*Math.PI*2,
      rPx: altToPx(alt),
      omega: omega
    };
  }
  return arr;
}

function nFromSlider(v){
  // exponential map: v in [0,1000] -> N in [N_TODAY, N_MAX]
  return N_TODAY * Math.pow(SPEC_MULT, v/1000);
}

function fmtInt(n){
  return Math.round(n).toLocaleString('en-US');
}

function draw(elapsedSec){
  const w=320,h=320;
  ctx.clearRect(0,0,w,h);
  const cx=w/2, cy=h/2;
  // band
  ctx.beginPath();
  ctx.arc(cx,cy,R_PX_MAX,0,Math.PI*2);
  ctx.arc(cx,cy,R_PX_EARTH,0,Math.PI*2,true);
  ctx.fillStyle = cssVar('--band');
  ctx.fill('evenodd');
  // earth
  ctx.beginPath();
  ctx.arc(cx,cy,R_PX_EARTH,0,Math.PI*2);
  ctx.fillStyle = cssVar('--earth');
  ctx.fill();
  // dots
  const VISUAL_SPEED = 4000; // speeds up real Kepler motion for visibility only
  const dotR = dots.length>900 ? 1.1 : 1.8;
  ctx.fillStyle = cssVar('--dot');
  for (const d of dots){
    const ang = d.angle0 + d.omega*elapsedSec*VISUAL_SPEED;
    const x = cx + d.rPx*Math.cos(ang);
    const y = cy + d.rPx*Math.sin(ang);
    ctx.beginPath();
    ctx.arc(x,y,dotR,0,Math.PI*2);
    ctx.fill();
  }
}

function updateReadouts(N){
  const mult = Math.pow(N/N_TODAY, 2);
  nval.textContent = fmtInt(N);
  mval.textContent = (mult<10 ? mult.toFixed(1) : Math.round(mult).toLocaleString('en-US')) + '×';
}

// filed stacked bar (static, computed from real filing numbers)
const parts = [
  {v:95000, c:'--bar1'},
  {v:1000000, c:'--bar2'},
  {v:88000, c:'--bar3'},
  {v:51600, c:'--bar4'}
];
const total = parts.reduce((s,p)=>s+p.v,0);
const bigbar = document.getElementById('bigbar');
parts.forEach(p=>{
  const seg = document.createElement('div');
  seg.className='bar-seg';
  seg.style.width = (p.v/total*100)+'%';
  seg.style.background = cssVar(p.c);
  bigbar.appendChild(seg);
});
document.getElementById('totlab').textContent = (total/1e6).toFixed(3)+'M filed';

const basebar = document.getElementById('basebar');
const baseSeg = document.createElement('div');
baseSeg.className='bar-seg';
baseSeg.style.width = (N_TODAY/total*100)+'%';
baseSeg.style.background = cssVar('--baseline');
basebar.appendChild(baseSeg);

let lastTime = performance.now();
let elapsed = 0;

function onSliderChange(){
  const N = nFromSlider(+slider.value);
  dots = generateDots(N);
  updateReadouts(N);
}
slider.addEventListener('input', onSliderChange);

function frame(t){
  const dt = (t - lastTime)/1000;
  lastTime = t;
  if (playing) elapsed += dt;
  draw(elapsed);
  requestAnimationFrame(frame);
}

// init
onSliderChange();
draw(0);
window.__sceneReady = true;
requestAnimationFrame(frame);

const __ro = new ResizeObserver(() => {
  parent.postMessage({ explainItScene: "maneuver-demand", height: document.documentElement.scrollHeight }, "*");
});
__ro.observe(document.documentElement);
</script>
</body>
</html>
