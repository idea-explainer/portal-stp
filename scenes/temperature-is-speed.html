<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Temperature is molecular speed</title>
<style>
  :root{
    --bg:#f7f7f9;
    --fg:#1a1a1a;
    --muted:#666666;
    --accent:#2b6cb0;
    --accent-fg:#ffffff;
    --panel:#ffffff;
    --border:#cccccc;
    --dot:#2b6cb0;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#111318;
      --fg:#e8e8ea;
      --muted:#9aa0a6;
      --accent:#7fb3ff;
      --accent-fg:#0a0f1a;
      --panel:#1b1e24;
      --border:#3a3f47;
      --dot:#7fb3ff;
    }
  }
  *{box-sizing:border-box;}
  body{
    margin:0; padding:12px; background:var(--bg); color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
  }
  .scene{ max-width:680px; margin:0 auto; }
  canvas{ display:block; width:100%; max-width:100%; background:var(--panel);
          border:1px solid var(--border); border-radius:6px; }
  .row{ display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin:8px 0; }
  .controls{ display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin:10px 0; }
  label{ font-size:13px; color:var(--muted); }
  input[type=range]{ width:220px; max-width:60vw; }
  button{
    background:var(--panel); color:var(--fg); border:1px solid var(--border);
    border-radius:5px; padding:5px 10px; font-size:13px; cursor:pointer;
  }
  button.active{ background:var(--accent); color:var(--accent-fg); border-color:var(--accent); }
  .readouts{ display:flex; flex-wrap:wrap; gap:16px; font-size:14px; margin:6px 0; }
  .readouts b{ color:var(--accent); }
  math{ font-size:17px; color:var(--fg); }
  .legend{ font-size:12px; color:var(--muted); margin:2px 0 10px 0; }
  .eqbox{ margin:8px 0; }
</style>
</head>
<body>
<div class="scene">

  <div class="controls">
    <label for="tSlider">Temperature T (K):</label>
    <input id="tSlider" type="range" min="300" max="3000" step="10" value="300">
    <button id="btnH2">H₂</button>
    <button id="btnNH3">NH₃</button>
    <button id="btnN2" class="active">N₂</button>
    <button id="btnPlay" style="display:none;">▶ Play</button>
  </div>

  <div class="readouts">
    <span>Temperature: <b id="tOut">300</b> K</span>
    <span>Molecular speed: <b id="vOut">0</b> m/s</span>
    <span>Molecule: <b id="mOut">N₂ (M = 28 g/mol)</b></span>
  </div>

  <canvas id="cv" width="640" height="220"></canvas>

  <div class="eqbox">
    <math display="block">
      <mi>v</mi><mo>=</mo>
      <msqrt><mfrac><mrow><mn>3</mn><mo>&#183;</mo><mi>k</mi><mo>&#183;</mo><mi>T</mi></mrow><mi>m</mi></mfrac></msqrt>
    </math>
    <div class="legend">
      v — typical molecular speed (m/s) · k — Boltzmann constant, 1.381×10⁻²³ J/K ·
      T — absolute temperature (K) · m — mass of one molecule (kg), = molar mass / Avogadro's number
    </div>
  </div>

</div>

<script>
(function(){
  // ---- physical constants ----
  const k = 1.380649e-23;      // J/K, Boltzmann constant
  const N_A = 6.02214076e23;   // 1/mol, Avogadro's number

  const molecules = {
    H2:  { name:'H₂',  molar:0.002  }, // kg/mol
    NH3: { name:'NH₃', molar:0.017  },
    N2:  { name:'N₂',  molar:0.028  }
  };
  let current = 'N2';
  let T = 300; // K

  function speed(T, molarMass){
    const m = molarMass / N_A; // kg per molecule
    return Math.sqrt(3 * k * T / m); // m/s
  }

  // ---- DOM refs ----
  const tSlider = document.getElementById('tSlider');
  const tOut = document.getElementById('tOut');
  const vOut = document.getElementById('vOut');
  const mOut = document.getElementById('mOut');
  const btns = { H2: document.getElementById('btnH2'), NH3: document.getElementById('btnNH3'), N2: document.getElementById('btnN2') };
  const btnPlay = document.getElementById('btnPlay');
  const cv = document.getElementById('cv');
  const ctx = cv.getContext('2d');

  function setActive(key){
    current = key;
    Object.keys(btns).forEach(k2 => btns[k2].classList.toggle('active', k2===key));
    updateReadouts();
  }
  btns.H2.addEventListener('click', ()=>setActive('H2'));
  btns.NH3.addEventListener('click', ()=>setActive('NH3'));
  btns.N2.addEventListener('click', ()=>setActive('N2'));

  tSlider.addEventListener('input', ()=>{
    T = Number(tSlider.value);
    updateReadouts();
  });

  function updateReadouts(){
    const mol = molecules[current];
    const v = speed(T, mol.molar);
    tOut.textContent = Math.round(T);
    vOut.textContent = Math.round(v);
    mOut.textContent = mol.name + ' (M = ' + Math.round(mol.molar*1000) + ' g/mol)';
  }

  // ---- particle animation ----
  const N_DOTS = 36;
  const VISUAL_SCALE = 0.0025; // m/s -> px/frame, chosen for legible motion
  let particles = [];

  function initParticles(){
    particles = [];
    for(let i=0;i<N_DOTS;i++){
      particles.push({
        x: 10 + Math.random()*(cv.width-20),
        y: 10 + Math.random()*(cv.height-20),
        angle: Math.random()*Math.PI*2,
        factor: 0.7 + Math.random()*0.6 // spread akin to speed distribution
      });
    }
  }
  initParticles();

  function getVar(name){
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  }

  function draw(){
    const bg = getVar('--panel') || '#ffffff';
    const dotColor = getVar('--dot') || '#2b6cb0';
    ctx.clearRect(0,0,cv.width,cv.height);
    ctx.fillStyle = bg;
    ctx.fillRect(0,0,cv.width,cv.height);

    const mol = molecules[current];
    const v = speed(T, mol.molar);
    const pxSpeed = v * VISUAL_SCALE;

    ctx.fillStyle = dotColor;
    for(const p of particles){
      const s = pxSpeed * p.factor;
      p.x += Math.cos(p.angle) * s;
      p.y += Math.sin(p.angle) * s;
      if(p.x < 5 || p.x > cv.width-5){ p.angle = Math.PI - p.angle; p.x = Math.max(5, Math.min(cv.width-5, p.x)); }
      if(p.y < 5 || p.y > cv.height-5){ p.angle = -p.angle; p.y = Math.max(5, Math.min(cv.height-5, p.y)); }
      ctx.beginPath();
      ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // ---- reduced motion handling ----
  const prefersReduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  let running = !prefersReduced;
  if(prefersReduced){
    btnPlay.style.display = 'inline-block';
    btnPlay.textContent = '▶ Play';
  }
  btnPlay.addEventListener('click', ()=>{
    running = !running;
    btnPlay.textContent = running ? '⏸ Pause' : '▶ Play';
    if(running) requestAnimationFrame(loop);
  });

  function loop(){
    if(!running) return;
    draw();
    requestAnimationFrame(loop);
  }

  // initial state
  updateReadouts();
  draw();
  if(running) requestAnimationFrame(loop);

  window.__sceneReady = true;

  const __ro = new ResizeObserver(() => {
    parent.postMessage({ explainItScene: "temperature-is-speed", height: document.documentElement.scrollHeight }, "*");
  });
  __ro.observe(document.documentElement);
})();
</script>
</body>
</html>
