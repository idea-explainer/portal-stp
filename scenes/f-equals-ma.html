<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>F = ma refresher</title>
<style>
  :root{
    --bg:#f7f7f9;
    --fg:#1b1e23;
    --muted:#5b6270;
    --panel:#ffffff;
    --border:#d6d9e0;
    --track:#9aa3b2;
    --block:#3462c9;
    --arrow:#c9463e;
    --line:#2c8f5a;
    --grid:#dfe3ea;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#14161a;
      --fg:#e8eaf0;
      --muted:#a2a9b8;
      --panel:#1d2027;
      --border:#333844;
      --track:#5b6272;
      --block:#6f9bff;
      --arrow:#ff7b70;
      --line:#5ad393;
      --grid:#2a2e37;
    }
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);
    font-family:-apple-system,Segoe UI,Helvetica,Arial,sans-serif;}
  .wrap{max-width:680px;margin:0 auto;padding:12px 14px 16px;}
  h2{font-size:1rem;margin:0 0 8px;font-weight:600;}
  canvas{width:100%;max-width:100%;height:auto;display:block;
    background:var(--panel);border:1px solid var(--border);border-radius:6px;}
  .controls{display:flex;flex-wrap:wrap;gap:14px;align-items:center;margin:10px 0;}
  .ctrl{display:flex;flex-direction:column;gap:2px;font-size:0.82rem;color:var(--muted);}
  .ctrl input[type=range]{width:220px;max-width:60vw;}
  button{
    padding:5px 12px;font-size:0.85rem;border-radius:5px;border:1px solid var(--border);
    background:var(--panel);color:var(--fg);cursor:pointer;height:fit-content;
  }
  button:active{transform:translateY(1px);}
  .readouts{display:flex;flex-wrap:wrap;gap:10px 20px;margin:6px 0 10px;font-size:0.85rem;}
  .readouts b{color:var(--fg);}
  .readouts span{color:var(--muted);}
  math{font-size:1.05rem;}
  .legend{font-size:0.76rem;color:var(--muted);margin:2px 0 4px;}
</style>
</head>
<body>
<div class="wrap">
  <h2>Force → acceleration → accumulated velocity</h2>

  <math display="block">
    <mi>F</mi><mo>=</mo><mi>m</mi><mi>a</mi>
  </math>
  <div class="legend">
    F — applied force (N) &nbsp;·&nbsp; m — mass, fixed at 500 kg &nbsp;·&nbsp; a — acceleration (m/s²)
  </div>

  <canvas id="c" width="640" height="300"></canvas>

  <div class="controls">
    <div class="ctrl">
      <label for="fSlider">Force F (N)</label>
      <input id="fSlider" type="range" min="0" max="200" step="1" value="100">
    </div>
    <button id="toggle">Pause</button>
  </div>

  <div class="readouts">
    <span>F = <b id="rF">100</b> N</span>
    <span>a = <b id="rA">0.200</b> m/s²</span>
    <span>v = <b id="rV">0.00</b> m/s</span>
    <span>t = <b id="rT">0.0</b> s</span>
  </div>
</div>

<script>
(function(){
  const MASS = 500; // kg
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const slider = document.getElementById('fSlider');
  const toggleBtn = document.getElementById('toggle');
  const rF = document.getElementById('rF');
  const rA = document.getElementById('rA');
  const rV = document.getElementById('rV');
  const rT = document.getElementById('rT');

  const reduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  let F = parseFloat(slider.value);
  let v = 0, t = 0, distPx = 0;
  let running = !reduced;
  toggleBtn.textContent = running ? 'Pause' : 'Play';

  const WINDOW = 60; // seconds shown in strip chart
  let history = [{t:0, v:0}];

  function cssVar(name){
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  }

  slider.addEventListener('input', () => { F = parseFloat(slider.value); });
  toggleBtn.addEventListener('click', () => {
    running = !running;
    toggleBtn.textContent = running ? 'Pause' : 'Play';
    lastTs = null;
  });

  const W = canvas.width, H = canvas.height;
  const topH = 100;       // diagram panel
  const chartTop = 118, chartBottom = H - 22, chartLeft = 46, chartRight = W - 12;

  function drawDiagram(){
    const track = cssVar('--track'), block = cssVar('--block'), arrow = cssVar('--arrow'), fg = cssVar('--fg');
    ctx.save();
    ctx.strokeStyle = track;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(20, 60);
    ctx.lineTo(W-20, 60);
    ctx.stroke();

    // block position wraps along track for continuous-motion feel
    const trackLen = W - 80;
    const wrapMeters = 40; // meters per visual lap
    const posFrac = ((distPx % wrapMeters) + wrapMeters) % wrapMeters / wrapMeters;
    const bx = 40 + posFrac * trackLen;
    const by = 60;

    // block
    ctx.fillStyle = block;
    ctx.fillRect(bx-20, by-32, 40, 32);
    ctx.strokeStyle = fg;
    ctx.lineWidth = 1;
    ctx.strokeRect(bx-20, by-32, 40, 32);

    // force arrow (from left side of block), length ∝ F
    const maxLen = 130;
    const len = (F/200) * maxLen;
    if(len > 1){
      const ax0 = bx-20, ay0 = by-16;
      const ax1 = ax0 - len;
      ctx.strokeStyle = arrow;
      ctx.fillStyle = arrow;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(ax0, ay0);
      ctx.lineTo(ax1, ay0);
      ctx.stroke();
      // arrowhead pointing toward block (rightward)
      ctx.beginPath();
      ctx.moveTo(ax0, ay0);
      ctx.lineTo(ax0-10, ay0-6);
      ctx.lineTo(ax0-10, ay0+6);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }

  function drawChart(){
    const grid = cssVar('--grid'), muted = cssVar('--muted'), line = cssVar('--line'), fg = cssVar('--fg');
    ctx.save();
    ctx.font = '11px sans-serif';
    ctx.fillStyle = muted;
    ctx.strokeStyle = grid;
    ctx.lineWidth = 1;

    const xMax = Math.max(t, WINDOW);
    const xMin = Math.max(0, xMax - WINDOW);
    let maxV = 1;
    for(const p of history) if(p.v > maxV) maxV = p.v;
    const yMax = Math.max(5, maxV * 1.25);

    function px(tt){ return chartLeft + (tt - xMin) / (xMax - xMin) * (chartRight - chartLeft); }
    function py(vv){ return chartBottom - (vv / yMax) * (chartBottom - chartTop); }

    // axes
    ctx.beginPath();
    ctx.moveTo(chartLeft, chartTop);
    ctx.lineTo(chartLeft, chartBottom);
    ctx.lineTo(chartRight, chartBottom);
    ctx.stroke();

    // y ticks
    for(let i=0;i<=4;i++){
      const vv = yMax * i/4;
      const yy = py(vv);
      ctx.strokeStyle = grid;
      ctx.beginPath(); ctx.moveTo(chartLeft, yy); ctx.lineTo(chartRight, yy); ctx.stroke();
      ctx.fillStyle = muted;
      ctx.fillText(vv.toFixed(1), 4, yy+3);
    }
    // x ticks
    for(let i=0;i<=4;i++){
      const tt = xMin + (xMax-xMin) * i/4;
      const xx = px(tt);
      ctx.fillStyle = muted;
      ctx.fillText(tt.toFixed(0), xx-8, chartBottom+14);
    }
    ctx.fillText('v (m/s)', 4, chartTop-6);
    ctx.fillText('t (s)', chartRight-16, chartBottom+14);

    // data line
    ctx.strokeStyle = line;
    ctx.lineWidth = 2;
    ctx.beginPath();
    let started = false;
    for(const p of history){
      if(p.t < xMin) continue;
      const xx = px(p.t), yy = py(p.v);
      if(!started){ ctx.moveTo(xx,yy); started = true; } else ctx.lineTo(xx,yy);
    }
    ctx.stroke();
    ctx.restore();
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    drawDiagram();
    drawChart();
  }

  function updateReadouts(){
    rF.textContent = Math.round(F);
    rA.textContent = (F/MASS).toFixed(3);
    rV.textContent = v.toFixed(2);
    rT.textContent = t.toFixed(1);
  }

  let lastTs = null;
  function frame(ts){
    if(running){
      if(lastTs === null) lastTs = ts;
      let dt = (ts - lastTs) / 1000;
      dt = Math.min(dt, 0.1);
      lastTs = ts;
      const a = F / MASS;
      v += a * dt;
      t += dt;
      distPx += v * dt;
      history.push({t, v});
      while(history.length && history[0].t < t - WINDOW - 2) history.shift();
    } else {
      lastTs = null;
    }
    updateReadouts();
    draw();
    requestAnimationFrame(frame);
  }

  updateReadouts();
  draw();
  window.__sceneReady = true;
  requestAnimationFrame(frame);

  const __ro = new ResizeObserver(() => {
    parent.postMessage({ explainItScene: "f-equals-ma", height: document.documentElement.scrollHeight }, "*");
  });
  __ro.observe(document.documentElement);
})();
</script>
</body>
</html>
