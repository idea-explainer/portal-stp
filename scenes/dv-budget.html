<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Delta-v Budget</title>
<style>
:root{
  --bg:#f7f7f9;
  --fg:#1a1c20;
  --panel:#ffffff;
  --border:#d0d3d8;
  --accent:#2266cc;
  --track:#e3e5e9;
  --earth:#3a6ea5;
  --orbit:#9aa3ad;
  --sat:#e0722d;
  --danger:#c0392b;
  --ok:#2a8f4d;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#15171a;
    --fg:#e8e9eb;
    --panel:#1f2227;
    --border:#3a3e46;
    --accent:#5b9bd5;
    --track:#2c3036;
    --earth:#4a80b8;
    --orbit:#5c6570;
    --sat:#ff9052;
    --danger:#e0685a;
    --ok:#4fbf7f;
  }
}
*{box-sizing:border-box;}
body{
  margin:0; padding:12px; background:var(--bg); color:var(--fg);
  font-family:-apple-system,Segoe UI,Helvetica,Arial,sans-serif;
  font-size:14px;
}
#wrap{max-width:680px; margin:0 auto;}
h2{font-size:15px; margin:0 0 10px 0; font-weight:600;}
#stage{
  display:flex; flex-wrap:wrap; gap:14px;
}
.panel{
  background:var(--panel); border:1px solid var(--border); border-radius:8px;
  padding:10px; flex:1 1 260px; min-width:220px;
}
canvas{max-width:100%; display:block; margin:0 auto;}
.readouts{font-size:13px; line-height:1.5; margin-top:6px;}
.readouts b{font-variant-numeric:tabular-nums;}
#barBox{
  display:flex; gap:8px; align-items:flex-end; height:180px; margin:10px 0;
}
#barTrack{
  width:34px; height:100%; background:var(--track); border-radius:4px;
  position:relative; overflow:hidden; border:1px solid var(--border);
}
#barFill{
  position:absolute; bottom:0; left:0; width:100%; background:var(--accent);
  transition:height .5s ease, background .3s ease;
}
button{
  font-size:12.5px; padding:6px 8px; border-radius:6px; border:1px solid var(--border);
  background:var(--panel); color:var(--fg); cursor:pointer; margin:3px 4px 3px 0;
}
button:disabled{opacity:.4; cursor:not-allowed;}
button.primary{border-color:var(--accent);}
#ledger{
  max-height:110px; overflow-y:auto; font-size:12px; margin-top:6px;
  border-top:1px solid var(--border); padding-top:4px;
}
#ledger div{display:flex; justify-content:space-between; padding:1px 0;}
.eq{font-size:12px; color:var(--fg); opacity:.8; margin-top:6px;}
#playBtn{display:none;}
</style>
</head>
<body>
<div id="wrap">
  <h2>Δv budget: a fixed cumulative allowance, not a top speed</h2>
  <div id="stage">
    <div class="panel">
      <canvas id="orbitCanvas" width="260" height="260"></canvas>
      <div class="readouts">
        Satellite state: <b id="statusReadout">nominal, LEO</b>
      </div>
      <button id="playBtn">▶ play orbit motion</button>
    </div>
    <div class="panel">
      <div class="eq">Cost per burn = commanded Δv (m/s). Budget only sums.</div>
      <div id="barBox">
        <div id="barTrack"><div id="barFill" style="height:100%"></div></div>
        <div class="readouts">
          Δv remaining: <b id="remReadout">5000</b> m/s<br>
          Δv spent (cumulative): <b id="spentReadout">0</b> m/s<br>
          Burns fired: <b id="countReadout">0</b>
        </div>
      </div>
      <div>
        <button id="btnAvoid">Collision avoid (100 m/s)</button>
        <button id="btnReposition">Reposition (500 m/s)</button>
        <button id="btnTransfer">LEO→GEO transfer (5000 m/s)</button>
      </div>
      <div id="ledger"></div>
    </div>
  </div>
</div>

<script>
// ---------- physics constants ----------
const G = 6.674e-11;        // m^3 kg^-1 s^-2
const M_EARTH = 5.972e24;   // kg
const MU = G * M_EARTH;     // standard gravitational parameter, m^3/s^2

const R_EARTH = 6.371e6;         // m
const ALT = [4.00e5, 2.00e7, 3.5786e7]; // LEO, mid, GEO altitudes (m)
const RADII_M = ALT.map(a => R_EARTH + a);
const ORBIT_NAMES = ["LEO", "mid orbit", "GEO"];

// Kepler's third law: T = 2*pi*sqrt(r^3/mu). Ratios preserved exactly;
// we apply one constant time-compression factor purely so rotation is
// visible on screen (real LEO period ~5500 s).
const TIME_COMPRESSION = 700;
const PERIODS = RADII_M.map(r => 2*Math.PI*Math.sqrt(r**3 / MU) / TIME_COMPRESSION);
const OMEGA = PERIODS.map(T => 2*Math.PI / T); // rad/s, display-speed

// ---------- canvas scale ----------
const canvas = document.getElementById('orbitCanvas');
const ctx = canvas.getContext('2d');
const CX = 130, CY = 130;
const PX_MAX = 108; // pixel radius of outermost (GEO) ring
const SCALE = PX_MAX / RADII_M[2];
const RADII_PX = RADII_M.map(r => r * SCALE);
const EARTH_PX = R_EARTH * SCALE;

function cssVar(name){ return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

// ---------- state ----------
const BUDGET_TOTAL = 5000; // m/s
let budgetRemaining = BUDGET_TOTAL;
let ring = 0;           // current orbit index (0 LEO, 1 mid, 2 GEO)
let displayR = RADII_PX[0];
let targetR = RADII_PX[0];
let theta = 0;
let jitter = 0;         // transient wobble for the small avoidance burn
let stranded = false;
let ledgerEntries = [];

const reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
let playing = !reduceMotion;
if (reduceMotion) document.getElementById('playBtn').style.display = 'inline-block';
document.getElementById('playBtn').addEventListener('click', () => {
  playing = true;
  document.getElementById('playBtn').style.display = 'none';
});

// ---------- UI refs ----------
const remReadout = document.getElementById('remReadout');
const spentReadout = document.getElementById('spentReadout');
const countReadout = document.getElementById('countReadout');
const statusReadout = document.getElementById('statusReadout');
const barFill = document.getElementById('barFill');
const ledgerBox = document.getElementById('ledger');
const btnAvoid = document.getElementById('btnAvoid');
const btnReposition = document.getElementById('btnReposition');
const btnTransfer = document.getElementById('btnTransfer');

function fire(cost, label, effect){
  if (stranded || cost > budgetRemaining) return;
  budgetRemaining -= cost;
  ledgerEntries.push({label, cost, cum: BUDGET_TOTAL - budgetRemaining});
  const row = document.createElement('div');
  row.innerHTML = `<span>${label}</span><span>-${cost} → total ${BUDGET_TOTAL - budgetRemaining} m/s</span>`;
  ledgerBox.prepend(row);

  if (effect === 'avoid') { jitter = 1.0; }
  else if (effect === 'reposition') { ring = 1; targetR = RADII_PX[1]; }
  else if (effect === 'transfer') { ring = 2; targetR = RADII_PX[2]; }

  if (budgetRemaining <= 0) { budgetRemaining = 0; stranded = true; }
  updateUI();
}

function updateUI(){
  remReadout.textContent = Math.round(budgetRemaining);
  spentReadout.textContent = Math.round(BUDGET_TOTAL - budgetRemaining);
  countReadout.textContent = ledgerEntries.length;
  barFill.style.height = (100 * budgetRemaining / BUDGET_TOTAL).toFixed(1) + '%';
  barFill.style.background = budgetRemaining <= 0 ? cssVar('--danger') : cssVar('--accent');
  statusReadout.textContent = stranded ? 'STRANDED — no Δv left' : `nominal, ${ORBIT_NAMES[ring]}`;
  statusReadout.style.color = stranded ? cssVar('--danger') : cssVar('--fg');

  btnAvoid.disabled = stranded || 100 > budgetRemaining;
  btnReposition.disabled = stranded || 500 > budgetRemaining;
  btnTransfer.disabled = stranded || 5000 > budgetRemaining;
}

btnAvoid.addEventListener('click', () => fire(100, 'Collision avoidance', 'avoid'));
btnReposition.addEventListener('click', () => fire(500, 'Reposition burn', 'reposition'));
btnTransfer.addEventListener('click', () => fire(5000, 'LEO→GEO transfer', 'transfer'));

// ---------- drawing ----------
function draw(){
  ctx.clearRect(0,0,260,260);
  ctx.fillStyle = cssVar('--bg');
  ctx.fillRect(0,0,260,260);

  // orbit rings
  ctx.strokeStyle = cssVar('--orbit');
  ctx.lineWidth = 1;
  RADII_PX.forEach((r,i) => {
    ctx.beginPath();
    ctx.arc(CX, CY, r, 0, Math.PI*2);
    ctx.stroke();
  });

  // earth
  ctx.fillStyle = cssVar('--earth');
  ctx.beginPath();
  ctx.arc(CX, CY, EARTH_PX, 0, Math.PI*2);
  ctx.fill();

  // satellite
  const wobble = jitter > 0 ? Math.sin(jitter*Math.PI*6) * 6 * jitter : 0;
  const r = displayR + wobble;
  const sx = CX + r * Math.cos(theta);
  const sy = CY + r * Math.sin(theta);
  ctx.fillStyle = stranded ? cssVar('--danger') : cssVar('--sat');
  ctx.beginPath();
  ctx.arc(sx, sy, 5, 0, Math.PI*2);
  ctx.fill();
}

let lastT = null;
function tick(t){
  if (lastT === null) lastT = t;
  const dt = Math.min((t - lastT)/1000, 0.05);
  lastT = t;

  if (playing) {
    theta += OMEGA[ring] * dt;
    if (jitter > 0) jitter = Math.max(0, jitter - dt*1.2);
    displayR += (targetR - displayR) * Math.min(1, dt*4);
  }
  draw();
  requestAnimationFrame(tick);
}

updateUI();
draw();
window.__sceneReady = true;
requestAnimationFrame(tick);

const __ro = new ResizeObserver(() => {
  parent.postMessage({ explainItScene: "dv-budget", height: document.documentElement.scrollHeight }, "*");
});
__ro.observe(document.documentElement);
</script>
</body>
</html>
