<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>9 hours versus 527 days</title>
<style>
  :root{
    --bg:#ffffff; --fg:#111827; --panel:#f3f4f6; --grid:#d1d5db;
    --solar:#15803d; --electric:#1d4ed8; --chem:#b91c1c; --accent:#6b7280;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0f172a; --fg:#e5e7eb; --panel:#1e293b; --grid:#3b4658;
      --solar:#4ade80; --electric:#60a5fa; --chem:#f87171; --accent:#9ca3af;
    }
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);
    font-family:-apple-system,Segoe UI,Helvetica,Arial,sans-serif;}
  .wrap{max-width:680px;margin:0 auto;padding:10px 14px 16px;}
  h2{font-size:15px;margin:4px 0 10px;font-weight:600;}
  canvas{max-width:100%;height:auto;display:block;background:var(--panel);
    border-radius:6px;}
  .controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:10px;}
  .controls label{font-size:13px;flex:1 1 260px;}
  input[type=range]{width:100%;}
  button{font-size:13px;padding:6px 12px;border-radius:5px;border:1px solid var(--accent);
    background:var(--panel);color:var(--fg);cursor:pointer;}
  .readouts{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
  .card{flex:1 1 150px;border-radius:6px;padding:8px 10px;background:var(--panel);
    border-left:5px solid var(--accent);}
  .card b{display:block;font-size:11px;font-weight:600;opacity:.8;margin-bottom:2px;}
  .card .val{font-size:18px;font-weight:700;}
  .card .sub{font-size:11px;opacity:.75;}
  .solarc{border-left-color:var(--solar);}
  .elecc{border-left-color:var(--electric);}
  .ratioc{border-left-color:var(--accent);}
</style>
</head>
<body>
<div class="wrap">
  <h2>Maneuver time vs. &Delta;v: &Delta;t &asymp; m&middot;&Delta;v / F</h2>
  <canvas id="cv" width="640" height="360" aria-label="chart of maneuver time versus delta-v"></canvas>

  <div class="controls">
    <label for="dv">&Delta;v of maneuver: <b id="dvLabel">100</b> m/s
      <input type="range" id="dv" min="100" max="5000" step="10" value="100">
    </label>
    <button id="playBtn">Play sweep</button>
  </div>

  <div class="readouts">
    <div class="card solarc">
      <b>Solar thermal (green), F&asymp;159 N</b>
      <div class="val" id="solarVal">–</div>
      <div class="sub" id="solarSub">–</div>
    </div>
    <div class="card elecc">
      <b>Hall electric (blue), F&asymp;107 mN</b>
      <div class="val" id="elecVal">–</div>
      <div class="sub" id="elecSub">–</div>
    </div>
    <div class="card ratioc">
      <b>Electric / solar ratio</b>
      <div class="val" id="ratioVal">–</div>
      <div class="sub">times longer for electric</div>
    </div>
  </div>
</div>

<script>
// ---- physical model: Delta-t = m * Delta-v / F ----
const M = 1000;          // kg, representative spacecraft wet mass
const F_SOLAR = 159;     // N, solar-thermal thrust (100-200 N class)
const F_CHEM  = 150;     // N, storable biprop thrust
const F_ELEC  = 0.107;   // N, Hall-effect thruster thrust (~107 mN)
const DV_CHEM_MAX = 700; // m/s, biprop propellant-mass limit

const DV_MIN = 100, DV_MAX = 5000;
const T_MIN = 60;                 // 1 minute, seconds
const T_MAX = 2*365.25*86400;     // 2 years, seconds
const logMin = Math.log10(T_MIN), logMax = Math.log10(T_MAX);

function tOf(dv, F){ return M*dv/F; } // seconds

function addCommas(n){ return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ","); }

function formatDuration(sec){
  if(sec < 3600) return {main:(sec/60).toFixed(1)+" min", sub:addCommas(sec)+" s"};
  if(sec < 86400) return {main:(sec/3600).toFixed(2)+" h", sub:addCommas(sec/3600*1)+" h exact: "+ (sec/3600).toFixed(1)+" h"};
  return {main:(sec/86400).toFixed(1)+" d", sub:"("+addCommas(sec/3600)+" h)"};
}

// ---- canvas / chart geometry ----
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const W = cv.width, H = cv.height;
const padL=58, padR=14, padT=14, padB=34;
const plotW = W-padL-padR, plotH = H-padT-padB;

function css(varName){ return getComputedStyle(document.documentElement).getPropertyValue(varName).trim(); }

function toX(dv){ return padL + (dv-DV_MIN)/(DV_MAX-DV_MIN)*plotW; }
function toY(t){
  const L = Math.log10(Math.max(t,T_MIN));
  const f = (L-logMin)/(logMax-logMin);
  return padT + (1-f)*plotH;
}

const gridLines = [
  {t:3600, label:"1 hr"},
  {t:86400, label:"1 day"},
  {t:2592000, label:"1 month"},
  {t:31536000, label:"1 year"}
];

let dv = DV_MIN;

function drawChart(){
  const fg = css('--fg'), grid = css('--grid');
  const cSolar = css('--solar'), cElec = css('--electric'), cChem = css('--chem'), accent = css('--accent');

  ctx.clearRect(0,0,W,H);

  // horizontal gridlines
  ctx.strokeStyle = grid; ctx.fillStyle = fg; ctx.font = "11px sans-serif";
  ctx.lineWidth = 1;
  gridLines.forEach(g=>{
    const y = toY(g.t);
    ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(W-padR,y); ctx.stroke();
    ctx.textAlign='right'; ctx.fillText(g.label, padL-6, y+3);
  });

  // vertical ticks
  ctx.textAlign='center';
  [100,1000,2000,3000,4000,5000].forEach(v=>{
    const x = toX(v);
    ctx.strokeStyle = grid;
    ctx.beginPath(); ctx.moveTo(x,padT); ctx.lineTo(x,H-padB); ctx.stroke();
    ctx.fillStyle = fg;
    ctx.fillText(String(v), x, H-padB+16);
  });
  ctx.fillText("Δv (m/s)", padL+plotW/2, H-4);

  ctx.save();
  ctx.translate(14, padT+plotH/2);
  ctx.rotate(-Math.PI/2);
  ctx.textAlign='center';
  ctx.fillText("maneuver time (log scale)", 0, 0);
  ctx.restore();

  // curves
  function drawCurve(F, color, dvMax){
    ctx.beginPath();
    ctx.strokeStyle = color; ctx.lineWidth = 2.4;
    let first = true;
    for(let v=DV_MIN; v<=dvMax; v+=25){
      const t = tOf(v,F);
      const x = toX(v), y = toY(t);
      if(first){ ctx.moveTo(x,y); first=false; } else ctx.lineTo(x,y);
    }
    ctx.stroke();
  }
  drawCurve(F_CHEM, cChem, DV_CHEM_MAX);
  drawCurve(F_SOLAR, cSolar, DV_MAX);
  drawCurve(F_ELEC, cElec, DV_MAX);

  // cursor
  const xCur = toX(dv);
  ctx.strokeStyle = accent; ctx.setLineDash([4,3]); ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(xCur,padT); ctx.lineTo(xCur,H-padB); ctx.stroke();
  ctx.setLineDash([]);

  function dot(F,color){
    const t = tOf(dv,F);
    ctx.beginPath(); ctx.arc(xCur, toY(t), 4.5, 0, Math.PI*2);
    ctx.fillStyle = color; ctx.fill();
  }
  dot(F_SOLAR, cSolar);
  dot(F_ELEC, cElec);
  if(dv <= DV_CHEM_MAX) dot(F_CHEM, cChem);
}

function updateReadouts(){
  const tS = tOf(dv,F_SOLAR);
  const tE = tOf(dv,F_ELEC);
  const fS = formatDuration(tS), fE = formatDuration(tE);
  document.getElementById('solarVal').textContent = fS.main;
  document.getElementById('solarSub').textContent = fS.sub;
  document.getElementById('elecVal').textContent = fE.main;
  document.getElementById('elecSub').textContent = fE.sub;
  document.getElementById('ratioVal').textContent = Math.round(tE/tS).toLocaleString()+"×";
  document.getElementById('dvLabel').textContent = Math.round(dv);
}

function render(){ drawChart(); updateReadouts(); }

const slider = document.getElementById('dv');
slider.addEventListener('input', ()=>{ dv = parseFloat(slider.value); render(); });

// ---- optional animated sweep, respecting reduced motion ----
const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const playBtn = document.getElementById('playBtn');
let playing = false, startT = 0;
const DURATION = 6000;

function step(now){
  if(!playing) return;
  const frac = Math.min((now-startT)/DURATION, 1);
  dv = DV_MIN + frac*(DV_MAX-DV_MIN);
  slider.value = dv;
  render();
  if(frac < 1){ requestAnimationFrame(step); }
  else { playing = false; playBtn.textContent = "Play sweep"; }
}

playBtn.addEventListener('click', ()=>{
  if(playing){ playing = false; playBtn.textContent = "Play sweep"; return; }
  if(reduced){
    dv = DV_MAX; slider.value = dv; render();
    return;
  }
  playing = true; playBtn.textContent = "Pause";
  startT = performance.now();
  requestAnimationFrame(step);
});

// initial draw
dv = DV_MIN;
slider.value = dv;
render();
window.__sceneReady = true;

const __ro = new ResizeObserver(() => {
  parent.postMessage({ explainItScene: "time-curves", height: document.documentElement.scrollHeight }, "*");
});
__ro.observe(document.documentElement);
</script>
</body>
</html>
