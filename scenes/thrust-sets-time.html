<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Thrust sets the clock</title>
<style>
  :root{
    --bg:#f7f7f9; --fg:#1b1e23; --muted:#5b6270; --grid:#c9cdd6;
    --panel:#ffffff; --accent:#1f6feb; --line100:#d9480f; --line5000:#0b7285;
    --cursor:#e03131; --ref:#868e96; --btn-bg:#e9ecef; --btn-active:#1f6feb;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#14161a; --fg:#e8e9ec; --muted:#9aa1ac; --grid:#3a3f47;
      --panel:#1c1f24; --accent:#4c9aff; --line100:#ff8a5c; --line5000:#3bc9db;
      --cursor:#ff6b6b; --ref:#7a828e; --btn-bg:#2a2e35; --btn-active:#4c9aff;
    }
  }
  *{box-sizing:border-box;}
  body{
    margin:0; padding:12px; background:var(--bg); color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    max-width:680px;
  }
  .panel{background:var(--panel); border-radius:10px; padding:14px 16px; max-width:100%;}
  canvas{max-width:100%; height:auto; display:block; margin:8px auto;}
  .controls{display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-top:8px;}
  .row{display:flex; flex-wrap:wrap; gap:8px; align-items:center; width:100%;}
  label{font-size:13px; color:var(--muted); display:flex; flex-direction:column; gap:2px; flex:1; min-width:180px;}
  input[type=range]{width:100%;}
  button{
    font-size:13px; padding:6px 10px; border-radius:6px; border:1px solid var(--grid);
    background:var(--btn-bg); color:var(--fg); cursor:pointer;
  }
  button.active{background:var(--btn-active); color:#fff; border-color:var(--btn-active);}
  .readouts{display:flex; flex-wrap:wrap; gap:14px; margin-top:8px; font-size:14px;}
  .readouts div{background:var(--btn-bg); padding:6px 10px; border-radius:6px;}
  .readouts b{font-size:15px;}
  math{font-size:16px;}
  .legend{font-size:12px; color:var(--muted); margin:4px 0 10px 0; line-height:1.4;}
</style>
</head>
<body>
<div class="panel">
  <math display="block">
    <mi>&#916;t</mi><mo>=</mo>
    <mfrac><mrow><mi>m</mi><mo>&#183;</mo><mi>&#916;v</mi></mrow><mi>F</mi></mfrac>
  </math>
  <div class="legend">
    &#916;t &#8212; burn time (s) &#183; m &#8212; spacecraft mass, fixed at 500 kg &#183;
    &#916;v &#8212; required velocity change (m/s) &#183; F &#8212; engine thrust (N)
  </div>

  <canvas id="plot" width="640" height="380"></canvas>

  <div class="controls">
    <div class="row">
      <label>Engine thrust F (N), log scale from 1 mN to 200 N
        <input type="range" id="thrustSlider" min="-3000" max="2301" step="1" value="-1200">
      </label>
    </div>
    <div class="row">
      <span style="font-size:13px;color:var(--muted);">Required &#916;v:</span>
      <button id="dv100" class="active">100 m/s</button>
      <button id="dv5000">5,000 m/s</button>
    </div>
  </div>

  <div class="readouts">
    <div>Thrust: <b id="fReadout">-</b> N</div>
    <div>&#916;v: <b id="dvReadout">-</b> m/s</div>
    <div>Burn time: <b id="tReadout">-</b></div>
  </div>
</div>

<script>
const M = 500; // kg, fixed spacecraft mass
const MIN_SEC = 60, HOUR_SEC = 3600, DAY_SEC = 86400;
const MONTH_SEC = 2.6298e6, YEAR_SEC = 3.15576e7;

const cs = getComputedStyle(document.documentElement);
const col = name => cs.getPropertyValue(name).trim();

const canvas = document.getElementById('plot');
const ctx = canvas.getContext('2d');

let dv = 100;
let targetLogF = -1.2; // slider starts at -1200 -> log10F = -1.2 -> F ~0.063 N (ion engine region)
let currentLogF = targetLogF;
const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

const slider = document.getElementById('thrustSlider');
const dv100Btn = document.getElementById('dv100');
const dv5000Btn = document.getElementById('dv5000');
const fReadout = document.getElementById('fReadout');
const dvReadout = document.getElementById('dvReadout');
const tReadout = document.getElementById('tReadout');

const xMin = -3, xMax = Math.log10(200); // thrust N, log10
const yMin = 2.0, yMax = 9.5; // burn time in seconds, log10

const padL = 60, padR = 14, padT = 20, padB = 40;
const plotW = () => canvas.width - padL - padR;
const plotH = () => canvas.height - padT - padB;

function px(logF){ return padL + (logF - xMin) / (xMax - xMin) * plotW(); }
function py(logT){ return padT + (yMax - logT) / (yMax - yMin) * plotH(); }

function formatTime(seconds){
  if (seconds < HOUR_SEC) return (seconds / MIN_SEC).toFixed(1) + " minutes";
  if (seconds < 10 * DAY_SEC) return (seconds / HOUR_SEC).toFixed(1) + " hours";
  if (seconds < 90 * DAY_SEC) return (seconds / DAY_SEC).toFixed(1) + " days";
  if (seconds < 2 * YEAR_SEC) return (seconds / MONTH_SEC).toFixed(1) + " months";
  return (seconds / YEAR_SEC).toFixed(1) + " years";
}

function drawAxes(){
  ctx.strokeStyle = col('--grid');
  ctx.fillStyle = col('--muted');
  ctx.font = "11px sans-serif";
  ctx.lineWidth = 1;

  // x ticks: thrust
  const xTicks = [
    [-3, "1 mN"], [-2, "10 mN"], [-1, "0.1 N"], [0, "1 N"], [1, "10 N"], [Math.log10(200), "200 N"]
  ];
  xTicks.forEach(([v,label])=>{
    const x = px(v);
    ctx.beginPath(); ctx.moveTo(x, padT); ctx.lineTo(x, padT+plotH()); ctx.stroke();
    ctx.textAlign = "center";
    ctx.fillText(label, x, canvas.height - padB + 16);
  });

  // y ticks: time
  const yTicks = [
    [Math.log10(MIN_SEC), "1 min"], [Math.log10(HOUR_SEC), "1 hr"],
    [Math.log10(DAY_SEC), "1 day"], [Math.log10(MONTH_SEC), "1 mo"],
    [Math.log10(YEAR_SEC), "1 yr"], [Math.log10(10*YEAR_SEC), "10 yr"]
  ];
  yTicks.forEach(([v,label])=>{
    const y = py(v);
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(padL+plotW(), y); ctx.stroke();
    ctx.textAlign = "right";
    ctx.fillText(label, padL - 8, y + 4);
  });

  ctx.strokeStyle = col('--fg');
  ctx.lineWidth = 1.5;
  ctx.strokeRect(padL, padT, plotW(), plotH());

  ctx.fillStyle = col('--fg');
  ctx.textAlign = "center";
  ctx.fillText("Engine thrust F (N)", padL + plotW()/2, canvas.height - 6);
  ctx.save();
  ctx.translate(14, padT + plotH()/2);
  ctx.rotate(-Math.PI/2);
  ctx.fillText("Burn time \u0394t", 0, 0);
  ctx.restore();
}

function drawDvLine(dvVal, color, label, dashed){
  ctx.strokeStyle = color;
  ctx.lineWidth = dashed ? 1.5 : 2.5;
  ctx.setLineDash(dashed ? [5,4] : []);
  ctx.beginPath();
  let started = false;
  for (let lx = xMin; lx <= xMax + 0.001; lx += 0.02){
    const F = Math.pow(10, lx);
    const t = M * dvVal / F;
    const lt = Math.log10(t);
    if (lt < yMin || lt > yMax) { started = false; continue; }
    const X = px(lx), Y = py(lt);
    if (!started){ ctx.moveTo(X,Y); started = true; } else ctx.lineTo(X,Y);
  }
  ctx.stroke();
  ctx.setLineDash([]);

  // label near left-ish part of the line
  const lxLbl = xMin + 0.6;
  const tLbl = M*dvVal/Math.pow(10,lxLbl);
  const ltLbl = Math.max(yMin+0.3, Math.min(yMax-0.2, Math.log10(tLbl)));
  ctx.fillStyle = color;
  ctx.font = "12px sans-serif";
  ctx.textAlign = "left";
  ctx.fillText(label, px(lxLbl)+4, py(ltLbl)-6);
}

function drawRefLine(logF, label){
  const x = px(logF);
  ctx.strokeStyle = col('--ref');
  ctx.setLineDash([3,3]);
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(x, padT); ctx.lineTo(x, padT+plotH()); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = col('--ref');
  ctx.font = "11px sans-serif";
  ctx.save();
  ctx.translate(x+3, padT+12);
  ctx.rotate(Math.PI/2);
  ctx.textAlign = "left";
  ctx.fillText(label, 0, 0);
  ctx.restore();
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = col('--panel');
  ctx.fillRect(0,0,canvas.width,canvas.height);
  drawAxes();

  drawRefLine(Math.log10(0.05), "typical ion engine (~0.05 N)");
  drawRefLine(Math.log10(100), "typical chemical engine (~100 N)");

  const activeLabel = dv === 100 ? "\u0394v = 100 m/s" : "\u0394v = 5,000 m/s";
  drawDvLine(dv, dv === 100 ? col('--line100') : col('--line5000'), activeLabel, false);

  // cursor
  const F = Math.pow(10, currentLogF);
  const t = M * dv / F;
  const lt = Math.max(yMin, Math.min(yMax, Math.log10(t)));
  const X = px(currentLogF), Y = py(lt);
  ctx.fillStyle = col('--cursor');
  ctx.beginPath(); ctx.arc(X, Y, 5, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = col('--cursor'); ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(X, padT); ctx.lineTo(X, Y); ctx.lineTo(padL, Y); ctx.stroke();

  fReadout.textContent = F < 1 ? (F*1000).toFixed(1) + " m" : F.toFixed(F<10?2:0);
  dvReadout.textContent = dv;
  tReadout.textContent = formatTime(t);
}

function updateFromSlider(){
  targetLogF = parseFloat(slider.value) / 1000;
}

slider.addEventListener('input', updateFromSlider);
dv100Btn.addEventListener('click', ()=>{
  dv = 100; dv100Btn.classList.add('active'); dv5000Btn.classList.remove('active');
});
dv5000Btn.addEventListener('click', ()=>{
  dv = 5000; dv5000Btn.classList.add('active'); dv100Btn.classList.remove('active');
});

function animate(){
  if (reduceMotion){
    currentLogF = targetLogF;
  } else {
    const diff = targetLogF - currentLogF;
    currentLogF += Math.abs(diff) < 0.0005 ? diff : diff * 0.25;
  }
  draw();
  requestAnimationFrame(animate);
}

updateFromSlider();
draw();
window.__sceneReady = true;
requestAnimationFrame(animate);

const __ro = new ResizeObserver(() => {
  parent.postMessage({ explainItScene: "thrust-sets-time", height: document.documentElement.scrollHeight }, "*");
});
__ro.observe(document.documentElement);
</script>
</body>
</html>
