<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nuclear-Thermal Bridge</title>
<style>
  :root{
    --bg:#f7f7f5;
    --fg:#1a1a1a;
    --panel-bg:#ffffff;
    --green:#2e7d32;
    --orange:#e65100;
    --accent:#1565c0;
    --track:#cfcfcf;
    --muted:#666666;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#121212;
      --fg:#e9e9e9;
      --panel-bg:#1c1c1c;
      --green:#66bb6a;
      --orange:#ffab40;
      --accent:#64b5f6;
      --track:#4a4a4a;
      --muted:#aaaaaa;
    }
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);
    font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;}
  .scene{max-width:680px;margin:0 auto;padding:14px 16px 18px;}
  svg{width:100%;height:auto;display:block;max-width:100%;}
  .row{display:flex;flex-wrap:wrap;gap:14px;align-items:center;margin-top:6px;}
  label{font-size:13px;color:var(--muted);}
  input[type=range]{width:220px;}
  button{
    font-size:13px;padding:5px 10px;border-radius:6px;border:1px solid var(--track);
    background:var(--panel-bg);color:var(--fg);cursor:pointer;
  }
  .cards{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;}
  .card{
    flex:1 1 190px;background:var(--panel-bg);border:1px solid var(--track);
    border-radius:8px;padding:8px 10px;
  }
  .card h4{margin:0 0 6px;font-size:12px;color:var(--muted);font-weight:600;}
  .bar-track{width:100%;height:10px;border-radius:5px;background:var(--track);overflow:hidden;}
  .bar-fill{height:100%;border-radius:5px;}
  .card .val{font-size:15px;font-weight:600;margin-top:4px;}
  .note{font-size:12px;color:var(--green);min-height:16px;margin-top:6px;}
  .temp{font-size:12px;color:var(--muted);margin-top:4px;}
</style>
</head>
<body>
<div class="scene">
  <svg id="diagram" viewBox="0 0 640 260" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Engine cross section diagram">
    <!-- heat source block: orange, swaps -->
    <rect id="srcBox" x="20" y="80" width="150" height="90" rx="8"
          style="fill:var(--panel-bg);stroke:var(--orange);stroke-width:3"/>
    <g id="iconSolar">
      <circle cx="95" cy="112" r="14" style="fill:none;stroke:var(--orange);stroke-width:2"/>
      <g style="stroke:var(--orange);stroke-width:2">
        <line x1="95" y1="90" x2="95" y2="82"/>
        <line x1="95" y1="134" x2="95" y2="142"/>
        <line x1="73" y1="112" x2="65" y2="112"/>
        <line x1="117" y1="112" x2="125" y2="112"/>
        <line x1="79" y1="96" x2="73" y2="90"/>
        <line x1="111" y1="96" x2="117" y2="90"/>
        <line x1="79" y1="128" x2="73" y2="134"/>
        <line x1="111" y1="128" x2="117" y2="134"/>
      </g>
    </g>
    <g id="iconNuclear" style="opacity:0">
      <circle cx="95" cy="112" r="3.5" style="fill:var(--orange)"/>
      <ellipse cx="95" cy="112" rx="26" ry="10" style="fill:none;stroke:var(--orange);stroke-width:2"/>
      <ellipse cx="95" cy="112" rx="26" ry="10" transform="rotate(60 95 112)" style="fill:none;stroke:var(--orange);stroke-width:2"/>
      <ellipse cx="95" cy="112" rx="26" ry="10" transform="rotate(120 95 112)" style="fill:none;stroke:var(--orange);stroke-width:2"/>
    </g>
    <text id="srcLabel" x="95" y="158" text-anchor="middle" font-size="11" style="fill:var(--fg)">Concentrated sunlight</text>

    <!-- arrow source -> exchanger (part of swap, orange) -->
    <line x1="170" y1="125" x2="222" y2="125" style="stroke:var(--orange);stroke-width:3"/>
    <polygon points="222,118 234,125 222,132" style="fill:var(--orange)"/>
    <text x="196" y="115" text-anchor="middle" font-size="9" style="fill:var(--muted)">heat flux</text>

    <!-- heat exchanger block: green, unchanged -->
    <rect x="236" y="70" width="150" height="110" rx="8"
          style="fill:var(--panel-bg);stroke:var(--green);stroke-width:3"/>
    <g style="stroke:var(--green);stroke-width:1.5">
      <line x1="254" y1="90" x2="254" y2="160"/>
      <line x1="272" y1="90" x2="272" y2="160"/>
      <line x1="290" y1="90" x2="290" y2="160"/>
      <line x1="308" y1="90" x2="308" y2="160"/>
      <line x1="326" y1="90" x2="326" y2="160"/>
      <line x1="344" y1="90" x2="344" y2="160"/>
      <line x1="362" y1="90" x2="362" y2="160"/>
    </g>
    <text x="311" y="60" text-anchor="middle" font-size="11" style="fill:var(--green)">Heat exchanger channels</text>
    <text x="311" y="196" text-anchor="middle" font-size="11" style="fill:var(--green)" id="tempLabel">~3000 K</text>
    <text x="311" y="208" text-anchor="middle" font-size="9" style="fill:var(--muted)">unchanged</text>

    <!-- propellant feed -->
    <line x1="236" y1="200" x2="270" y2="180" style="stroke:var(--green);stroke-width:3"/>
    <polygon points="266,183 279,180 273,192" style="fill:var(--green)"/>
    <text x="238" y="222" font-size="10" style="fill:var(--muted)">propellant in</text>

    <!-- exchanger -> nozzle arrow -->
    <line x1="386" y1="125" x2="418" y2="125" style="stroke:var(--green);stroke-width:3"/>
    <polygon points="418,118 430,125 418,132" style="fill:var(--green)"/>

    <!-- nozzle: green, unchanged -->
    <polygon points="432,95 432,155 610,180 610,70" style="fill:var(--panel-bg);stroke:var(--green);stroke-width:3"/>
    <text x="500" y="60" text-anchor="middle" font-size="11" style="fill:var(--green)">Nozzle expansion</text>
    <g id="exhaust" style="stroke:var(--accent);stroke-width:3;opacity:0.85">
      <line x1="460" y1="125" x2="480" y2="125"/>
      <line x1="510" y1="125" x2="530" y2="125"/>
      <line x1="560" y1="125" x2="580" y2="125"/>
    </g>
  </svg>

  <div class="row">
    <label for="toggle">Heat source: concentrated sunlight (0) ↔ fission reactor (1)</label>
  </div>
  <div class="row">
    <input type="range" id="toggle" min="0" max="1" step="1" value="0">
    <span id="toggleVal" style="font-size:13px;font-weight:600;">Solar</span>
    <button id="playBtn" style="display:none;">Play</button>
  </div>

  <div class="cards">
    <div class="card">
      <h4>Relative performance</h4>
      <div class="bar-track"><div class="bar-fill" id="perfFill" style="background:var(--accent);width:0%"></div></div>
      <div class="val" id="perfVal">—</div>
    </div>
    <div class="card">
      <h4>Relative cost</h4>
      <div class="bar-track"><div class="bar-fill" id="costFill" style="background:var(--accent);width:0%"></div></div>
      <div class="val" id="costVal">—</div>
    </div>
  </div>
  <div class="temp">Chamber temperature (both states): <span id="tempReadout">3000 K</span></div>
  <div class="note" id="licenseNote"></div>
</div>

<script>
(function(){
  // ---- physics / spec constants (auditable) ----
  const T_CHAMBER_K = 3000;               // heat exchanger operating temperature, both architectures
  const PERF_FRAC_SOLAR   = 0.90;         // solar-thermal ≈ 90% of nuclear-thermal performance
  const PERF_FRAC_NUCLEAR = 1.00;
  const COST_FRAC_SOLAR   = 0.10;         // solar-thermal ≈ 10% of nuclear-thermal cost
  const COST_FRAC_NUCLEAR = 1.00;

  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  const iconSolar = document.getElementById('iconSolar');
  const iconNuclear = document.getElementById('iconNuclear');
  const srcLabel = document.getElementById('srcLabel');
  const toggle = document.getElementById('toggle');
  const toggleVal = document.getElementById('toggleVal');
  const perfFill = document.getElementById('perfFill');
  const costFill = document.getElementById('costFill');
  const perfVal = document.getElementById('perfVal');
  const costVal = document.getElementById('costVal');
  const licenseNote = document.getElementById('licenseNote');
  const tempReadout = document.getElementById('tempReadout');
  tempReadout.textContent = Math.round(T_CHAMBER_K) + ' K';

  let state = 0;        // 0 = solar, 1 = nuclear  (committed state)
  let animFrom = 0, animTo = 0, animStart = 0;
  const ANIM_MS = reduceMotion ? 0 : 420;

  function lerp(a,b,t){ return a + (b-a)*t; }

  function applyVisual(alpha){
    // alpha in [0,1] interpolates from animFrom-state visuals to animTo-state visuals
    iconSolar.style.opacity = String(1 - alpha);
    iconNuclear.style.opacity = String(alpha);
    srcLabel.textContent = alpha < 0.5 ? 'Concentrated sunlight' : 'Fission reactor core';

    const perf = lerp(
      animFrom ? PERF_FRAC_NUCLEAR : PERF_FRAC_SOLAR,
      animTo   ? PERF_FRAC_NUCLEAR : PERF_FRAC_SOLAR,
      alpha
    ) * 100;
    const cost = lerp(
      animFrom ? COST_FRAC_NUCLEAR : COST_FRAC_SOLAR,
      animTo   ? COST_FRAC_NUCLEAR : COST_FRAC_SOLAR,
      alpha
    ) * 100;

    perfFill.style.width = perf.toFixed(0) + '%';
    costFill.style.width = cost.toFixed(0) + '%';
    perfVal.textContent = Math.round(perf) + '%';
    costVal.textContent = Math.round(cost) + '%';

    toggleVal.textContent = alpha < 0.5 ? 'Solar' : 'Nuclear';
    licenseNote.textContent = alpha < 0.5
      ? 'no fissile material / no nuclear licensing'
      : '';
  }

  function stepAnim(ts){
    if (!animStart) animStart = ts;
    const t = ANIM_MS === 0 ? 1 : Math.min(1, (ts - animStart) / ANIM_MS);
    applyVisual(t);
    if (t < 1){
      requestAnimationFrame(stepAnim);
    } else {
      state = animTo;
    }
  }

  toggle.addEventListener('input', function(){
    const target = parseInt(toggle.value, 10);
    animFrom = state;
    animTo = target;
    animStart = 0;
    requestAnimationFrame(stepAnim);
  });

  // gentle continuous exhaust-dash motion (pure decoration, respects reduced motion)
  const exhaust = document.getElementById('exhaust');
  let running = !reduceMotion;
  const playBtn = document.getElementById('playBtn');
  if (reduceMotion){
    playBtn.style.display = 'inline-block';
    playBtn.textContent = 'Play';
  }
  playBtn.addEventListener('click', function(){
    running = !running;
    playBtn.textContent = running ? 'Pause' : 'Play';
    if (running) requestAnimationFrame(exhaustLoop);
  });

  let exStart = null;
  function exhaustLoop(ts){
    if (!running) return;
    if (exStart === null) exStart = ts;
    const dt = (ts - exStart) / 1000;
    const shift = (Math.sin(dt * 3) * 4);
    exhaust.setAttribute('transform', 'translate(' + shift.toFixed(1) + ',0)');
    requestAnimationFrame(exhaustLoop);
  }
  if (running) requestAnimationFrame(exhaustLoop);

  // initial draw
  applyVisual(0);
  window.__sceneReady = true;

  const __ro = new ResizeObserver(() => {
    parent.postMessage({ explainItScene: "nuclear-bridge", height: document.documentElement.scrollHeight }, "*");
  });
  __ro.observe(document.documentElement);
})();
</script>
</body>
</html>
